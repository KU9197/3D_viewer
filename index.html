<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Viewer</title>

    <script type="module"
        src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: white;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <model-viewer
        src="mohamed_hassan-bouquet-4451.glb"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1"
        tone-mapping="neutral">
    </model-viewer>

</body>
</html>
